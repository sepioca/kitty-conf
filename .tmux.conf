# General settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g allow-rename off

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
unbind '"'
# Preserve current working directory when splitting panes
bind | split-window -h -c "#{pane_current_path}"  # Horizontal split
bind - split-window -v -c "#{pane_current_path}"  # Vertical split

# Don't rename windows automatically
set-option -g allow-rename off

unbind r
bind r source-file ~/.tmux.conf

# Resize panes
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5
bind -r m resize-pane -Z

# Unbind default window switching behavior
unbind n
unbind p

# Remap to next/previous session using the correct tmux syntax
bind n switch-client -n
bind p switch-client -p

# Session group switching (requires fzf)
# g = switch within current group (sessions sharing same prefix before -)
# G = switch between ALL sessions
unbind s
bind s display-popup -E "tmux list-sessions -F '#{session_name}' | grep \"^$(tmux display-message -p '#S' | cut -d'-' -f1)-\" | fzf --reverse --bind 'j:down,k:up' | xargs tmux switch-client -t"
bind S display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --bind 'j:down,k:up' | xargs tmux switch-client -t"

# Enable mouse
set -g mouse on

# Use vi mode for copy-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # Start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # Copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # Don't exit copy mode when dragging with mouse

# Remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'


# DESIGN TWEAKS (Catppuccin Mocha - matching waybar)

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour '#cba6f7'

# copy mode
setw -g mode-style 'fg=#1e1e2e bg=#cba6f7 bold'

# pane borders
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#cba6f7'

# statusbar
set -g status-position bottom
set -g status-justify centre
set -g status-style 'fg=#cdd6f4 bg=#1e1e2e'

set -g status-left '#[fg=#1e1e2e,bg=#cba6f7,bold] 󰆍 #S #[fg=#cba6f7,bg=#313244]#[fg=#313244,bg=#1e1e2e]   '
set -g status-left-length 40


set -g status-right '#[fg=#cdd6f4,bg=#45475a] 󰥔 %H:%M #[fg=#1e1e2e,bg=#cba6f7,bold] 󰃭 %Y-%m-%d '
set -g status-right-length 50

setw -g window-status-current-style 'fg=#1e1e2e,bg=#cba6f7,bold'
setw -g window-status-current-format ' #I:#W '

setw -g window-status-style 'fg=#cdd6f4,bg=#45475a'
setw -g window-status-format ' #I:#W '

setw -g window-status-separator ' '

setw -g window-status-bell-style 'fg=#1e1e2e bg=#f38ba8 bold'

# messages
set -g message-style 'fg=#1e1e2e bg=#cba6f7 bold'

# Enable session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

